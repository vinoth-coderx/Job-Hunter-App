name: job_hunter
description: A modern job finder app built with Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Storage
  shared_preferences: ^2.3.2

  # Networking
  http: ^1.2.2
  http_parser: ^4.0.2

  # External links
  url_launcher: ^6.3.0

  # Deep links (Android App Links + iOS Universal Links). Listens for
  # https://jobhunter.app/job/<id> taps and routes into JobDetailById.
  # Tapping the link with the app installed opens the right screen
  # directly; without the app the OS / browser falls back to the
  # https URL, which we land on the marketing page with Play Store /
  # App Store buttons.
  app_links: ^6.3.2

  # In-app browser for the official Apply page
  webview_flutter: ^4.10.0

  # Auth
  google_sign_in: ^6.2.1

  # Utilities
  intl: ^0.19.0

  # Voice search
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # Location (auto-detect city for "Jobs in <city>" section + reverse
  # geocoding for the profile location autocomplete).
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # File picking (resume upload)
  file_picker: ^8.1.2
  path_provider: ^2.1.4

  # System share sheet — used to "Download" generated PDFs (resume
  # templates) to user-visible storage. On Android the app sandbox is
  # invisible to the File Manager, so a Share sheet that routes the
  # bytes to Files / Drive / Downloads is the cleanest cross-platform
  # path. iOS also benefits (AirDrop / Mail / Save to Files).
  share_plus: ^10.0.2

  # In-app PDF preview for the resume viewer modal.
  # Uses PDFium via FFI rather than a PlatformView, so it renders reliably
  # inside Navigator routes (the older flutter_pdfview hung on first load
  # for some users).
  pdfx: ^2.6.0

  # Payments
  razorpay_flutter: ^1.3.7

  # Real-time chat
  socket_io_client: ^2.0.3+1

  # Firebase — push notifications (FCM) + later auth migration.
  # Drop google-services.json (Android) & GoogleService-Info.plist (iOS)
  # into the platform folders before running the app, otherwise
  # Firebase.initializeApp will throw at startup.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_auth: ^5.3.1
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
